<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala do Tempo - Dark Mode</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        /* Ajuste para o scrollbar no modo escuro ficar bonito */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased selection:bg-orange-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SUAS CREDENCIAIS DO SUPABASE ---
        const SUPABASE_URL = 'https://sflzuzorlmddprbkdczv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_3viV5YSChpIMXYHAz-e-5g_GzP1d0E8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DISCIPLINAS = ["Português", "Matemática Financeira", "Estatística", "Direito Tributário", "LTE", "Contabilidade Geral", "Contabilidade de Custos", "Auditoria", "TI", "Direito Constitucional", "Direito Administrativo", "Direito Civil", "Direito Empresarial", "Direito Penal", "Administração Geral e Pública"];
        const CATEGORIAS = ["Teoria", "Questões", "Teste", "Revisão", "Simulado"];

        function App() {
            const [sessoes, setSessoes] = useState([]);
            const [aba, setAba] = useState('dashboard');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetchData();
            }, []);

            async function fetchData() {
                setLoading(true);
                const { data, error } = await supabase
                    .from('sessoes')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (data) setSessoes(data);
                setLoading(false);
            }

            async function salvarSessao(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const novaSessao = {
                    meta: parseInt(fd.get('meta')),
                    disciplina: fd.get('disciplina'),
                    tipo: fd.get('tipo'),
                    assunto: fd.get('assunto'),
                    tempo: parseInt(fd.get('tempo')),
                    total: parseInt(fd.get('total') || 0),
                    certas: parseInt(fd.get('certas') || 0)
                };

                const { error } = await supabase.from('sessoes').insert([novaSessao]);
                if (!error) {
                    fetchData(); 
                    setAba('dashboard');
                } else {
                    alert("Erro ao salvar no banco!");
                }
            }

            async function excluirSessao(id) {
                if(confirm("Apagar registro do banco de dados permanentemente?")) {
                    const { error } = await supabase.from('sessoes').delete().eq('id', id);
                    if (!error) fetchData();
                }
            }

            const exportarCSV = () => {
                const header = "Meta,Disciplina,Tipo,Assunto,Tempo(min),Total_Q,Certas\n";
                const rows = sessoes.map(s => `${s.meta},${s.disciplina},${s.tipo},${s.assunto},${s.tempo},${s.total},${s.certas}`).join("\n");
                const blob = new Blob([header + rows], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SALA_DO_TEMPO_BACKUP.csv`;
                a.click();
            };

            const statsPorMeta = useMemo(() => {
                const metas = Array.from({ length: 14 }, (_, i) => ({ n: i + 1, min: 0 }));
                sessoes.forEach(s => { if(metas[s.meta-1]) metas[s.meta-1].min += s.tempo; });
                return metas;
            }, [sessoes]);

            if (loading) return <div className="flex h-screen items-center justify-center font-bold text-orange-500 text-xl tracking-widest animate-pulse">CARREGANDO...</div>;

            return (
                <div className="min-h-screen">
                    {/* Topbar Laranja */}
                    <nav className="bg-orange-600 text-white p-4 shadow-xl shadow-orange-900/20 sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <h1 className="font-black text-xl tracking-tighter italic flex items-center gap-2">
                                <i className="lucide-flame"></i> SALA DO TEMPO 
                                <span className="text-[10px] bg-orange-800/50 px-2 py-1 rounded ml-1 tracking-wider">PRO</span>
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={() => setAba('dashboard')} className={`p-2 rounded-lg transition-colors ${aba==='dashboard'?'bg-white text-orange-600':'hover:bg-orange-500 text-orange-50'}`}><i className="lucide-layout-dashboard"></i></button>
                                <button onClick={() => setAba('novo')} className={`p-2 rounded-lg transition-colors ${aba==='novo'?'bg-white text-orange-600':'hover:bg-orange-500 text-orange-50'}`}><i className="lucide-plus"></i></button>
                                <button onClick={exportarCSV} className="p-2 rounded-lg hover:bg-orange-500 text-orange-50 transition-colors" title="Backup CSV"><i className="lucide-download"></i></button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto p-4 md:p-6">
                        {aba === 'dashboard' ? (
                            <div className="space-y-6">
                                {/* Cards principais (Dark) */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="bg-slate-800 p-5 rounded-3xl shadow-lg border border-slate-700 text-center relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 text-slate-700 opacity-20"><i className="lucide-clock w-24 h-24"></i></div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase relative z-10">Horas Totais</p>
                                        <p className="text-3xl font-black text-white relative z-10">{Math.floor(sessoes.reduce((acc,s)=>acc+s.tempo,0)/60)}h</p>
                                    </div>
                                    <div className="bg-slate-800 p-5 rounded-3xl shadow-lg border border-slate-700 text-center relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 text-slate-700 opacity-20"><i className="lucide-check-circle w-24 h-24"></i></div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase relative z-10">Questões</p>
                                        <p className="text-3xl font-black text-white relative z-10">{sessoes.reduce((acc,s)=>acc+s.total,0)}</p>
                                    </div>
                                    <div className="bg-slate-800 p-5 rounded-3xl shadow-lg border border-slate-700 text-center relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 text-slate-700 opacity-20"><i className="lucide-target w-24 h-24"></i></div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase relative z-10">Acerto Médio</p>
                                        <p className="text-3xl font-black text-emerald-400 relative z-10">
                                            {(() => {
                                                const t = sessoes.reduce((acc,s)=>acc+s.total,0);
                                                const c = sessoes.reduce((acc,s)=>acc+s.certas,0);
                                                return t > 0 ? Math.round((c/t)*100) : 0;
                                            })()}%
                                        </p>
                                    </div>
                                    <div className="bg-slate-800 p-5 rounded-3xl shadow-lg border border-slate-700 text-center relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 text-slate-700 opacity-20"><i className="lucide-flag w-24 h-24"></i></div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase relative z-10">Meta Atual</p>
                                        <p className="text-3xl font-black text-orange-500 relative z-10">{sessoes.length > 0 ? Math.max(...sessoes.map(s=>s.meta)) : 1}/14</p>
                                    </div>
                                </div>

                                {/* Gráfico de Evolução 14 Metas (Dark/Orange) */}
                                <div className="bg-slate-800 p-6 rounded-3xl shadow-lg border border-slate-700">
                                    <h2 className="text-sm font-black mb-6 uppercase tracking-widest text-slate-400 flex items-center gap-2">
                                        <i className="lucide-trending-up text-orange-500"></i> Evolução - Ciclo de 14 Semanas
                                    </h2>
                                    <div className="flex items-end gap-1.5 h-32">
                                        {statsPorMeta.map(m => (
                                            <div key={m.n} className="flex-1 flex flex-col items-center gap-2 group cursor-pointer">
                                                <div className="w-full bg-slate-700/50 rounded-t-lg relative flex flex-col justify-end h-full overflow-hidden">
                                                    <div 
                                                        className="bg-orange-500/80 w-full rounded-t-lg transition-all duration-500 group-hover:bg-orange-400" 
                                                        style={{height: `${Math.min((m.min/60)*10, 100)}%`}}
                                                    ></div>
                                                </div>
                                                <span className="text-[8px] font-black text-slate-500 uppercase group-hover:text-orange-400 transition-colors">M{m.n}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Listagem do Banco de Dados (Dark) */}
                                <div className="bg-slate-800 rounded-3xl shadow-lg border border-slate-700 overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="bg-slate-900/50 text-[10px] uppercase font-black text-slate-400 border-b border-slate-700">
                                            <tr>
                                                <th className="p-4 rounded-tl-3xl">Meta/Disc</th>
                                                <th className="p-4">Assunto</th>
                                                <th className="p-4 text-center">Desempenho</th>
                                                <th className="p-4 rounded-tr-3xl"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-700/50">
                                            {sessoes.map(s => (
                                                <tr key={s.id} className="hover:bg-slate-700/30 transition-colors">
                                                    <td className="p-4">
                                                        <span className="text-[10px] bg-orange-500/10 text-orange-400 border border-orange-500/20 px-1.5 py-0.5 rounded font-black mr-2">M{s.meta}</span>
                                                        <span className="font-bold text-slate-200">{s.disciplina}</span>
                                                    </td>
                                                    <td className="p-4 text-slate-400 truncate max-w-[200px]">
                                                        {s.assunto} <br/>
                                                        <span className="text-[10px] text-slate-500 uppercase tracking-wider">{s.tempo} min • {s.tipo}</span>
                                                    </td>
                                                    <td className="p-4 text-center">
                                                        {s.total > 0 ? (
                                                            <div className={`font-black ${Math.round((s.certas/s.total)*100) >= 80 ? 'text-emerald-400' : Math.round((s.certas/s.total)*100) >= 60 ? 'text-amber-400' : 'text-rose-400'}`}>
                                                                {Math.round((s.certas/s.total)*100)}%
                                                            </div>
                                                        ) : <span className="text-slate-600">-</span>}
                                                    </td>
                                                    <td className="p-4 text-right">
                                                        <button onClick={() => excluirSessao(s.id)} className="text-slate-500 hover:text-rose-400 transition-colors p-2 hover:bg-rose-400/10 rounded-lg">
                                                            <i className="lucide-trash-2 w-4 h-4"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                            {sessoes.length === 0 && (
                                                <tr>
                                                    <td colSpan="4" className="p-8 text-center text-slate-500 font-medium">Nenhum estudo registrado ainda. O relógio está correndo!</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-lg mx-auto bg-slate-800 p-8 rounded-[40px] shadow-2xl border border-slate-700 relative overflow-hidden">
                                <div className="absolute -right-10 -top-10 w-40 h-40 bg-orange-500/10 rounded-full blur-3xl"></div>
                                
                                <h2 className="text-2xl font-black mb-8 text-white tracking-tight relative z-10 flex items-center gap-3">
                                    <div className="bg-orange-500/20 p-2 rounded-xl text-orange-500"><i className="lucide-pen-line"></i></div>
                                    Novo Registro
                                </h2>

                                <form onSubmit={salvarSessao} className="space-y-5 relative z-10">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Meta (Semana)</label>
                                            <select name="meta" className="w-full bg-slate-900/50 text-white p-3.5 rounded-2xl border border-slate-700 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none font-bold transition-all appearance-none">
                                                {Array.from({length:14}, (_,i)=><option key={i+1} value={i+1} className="bg-slate-800">Semana {i+1}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Tipo</label>
                                            <select name="tipo" className="w-full bg-slate-900/50 text-white p-3.5 rounded-2xl border border-slate-700 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none font-bold transition-all appearance-none">
                                                {CATEGORIAS.map(c=><option key={c} className="bg-slate-800">{c}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Disciplina</label>
                                        <select name="disciplina" className="w-full bg-slate-900/50 text-white p-3.5 rounded-2xl border border-slate-700 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none font-bold transition-all appearance-none">
                                            {DISCIPLINAS.map(d=><option key={d} className="bg-slate-800">{d}</option>)}
                                        </select>
                                    </div>

                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Assunto Detalhado</label>
                                        <input name="assunto" required placeholder="Ex: Direitos e Garantias Fundamentais" className="w-full bg-slate-900/50 text-white p-3.5 rounded-2xl border border-slate-700 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none font-bold transition-all placeholder:text-slate-600" />
                                    </div>

                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Minutos</label>
                                            <input name="tempo" type="number" required placeholder="0" className="w-full bg-slate-900/50 text-white p-3.5 rounded-2xl border border-slate-700 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none font-bold transition-all text-center" />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Total Q.</label>
                                            <input name="total" type="number" placeholder="0" className="w-full bg-slate-900/50 text-white p-3.5 rounded-2xl border border-slate-700 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none font-bold transition-all text-center" />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Certas</label>
                                            <input name="certas" type="number" placeholder="0" className="w-full bg-slate-900/50 text-emerald-400 p-3.5 rounded-2xl border border-slate-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none font-black transition-all text-center placeholder:text-slate-600" />
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white mt-4 py-4 rounded-2xl font-black tracking-wide shadow-lg shadow-orange-900/20 hover:from-orange-500 hover:to-orange-400 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                                        SALVAR NO BANCO <i className="lucide-arrow-right w-4 h-4"></i>
                                    </button>
                                </form>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
