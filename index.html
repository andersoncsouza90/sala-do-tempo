<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala do Tempo - Fix Final</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: white; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const SUPABASE_URL = 'https://sflzuzorlmddprbkdczv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_3viV5YSChpIMXYHAz-e-5g_GzP1d0E8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DISCIPLINAS = ["Português", "Matemática Financeira", "Estatística", "Direito Tributário", "LTE", "Contabilidade Geral", "Contabilidade de Custos", "Auditoria", "TI", "Direito Constitucional", "Direito Administrativo", "Direito Civil", "Direito Empresarial", "Direito Penal", "Administração Geral e Pública"];

        function App() {
            const [aba, setAba] = useState('dashboard');
            const [plano, setPlano] = useState([]);
            const [sessoes, setSessoes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tarefaAtiva, setTarefaAtiva] = useState(null);

            useEffect(() => { fetchData(); }, []);

            async function fetchData() {
                try {
                    const { data: cron } = await supabase.from('cronograma').select('*').order('meta', { ascending: true });
                    const { data: sess } = await supabase.from('sessoes').select('*');
                    setPlano(cron || []);
                    setSessoes(sess || []);
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            }

            async function handleSalvarCronograma(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                
                const novoItem = {
                    meta: parseInt(fd.get('meta')),
                    disciplina: fd.get('disciplina'),
                    assunto: fd.get('assunto'),
                    status: fd.get('tipo')
                };

                const { error } = await supabase.from('cronograma').insert([novoItem]);

                if (error) {
                    alert(`ERRO DO BANCO: ${error.message}\n\nProvavelmente a coluna "id" não está configurada para autoincremento no Supabase.`);
                } else {
                    alert("Meta salva!");
                    fetchData();
                    e.target.reset();
                }
            }

            async function salvarSessao(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const payload = {
                    cronograma_id: tarefaAtiva.id,
                    meta: tarefaAtiva.meta,
                    disciplina: tarefaAtiva.disciplina,
                    assunto: tarefaAtiva.assunto,
                    tempo: parseInt(fd.get('tempo')) || 0,
                    total: parseInt(fd.get('total')) || 0,
                    certas: parseInt(fd.get('certas')) || 0,
                    tipo: tarefaAtiva.status
                };
                const { error } = await supabase.from('sessoes').insert([payload]);
                if (!error) { setTarefaAtiva(null); fetchData(); }
            }

            if (loading) return <div className="h-screen flex items-center justify-center text-orange-500 font-black italic animate-pulse">CARREGANDO SALA DO TEMPO...</div>;

            return (
                <div className="flex min-h-screen">
                    <aside className="w-20 md:w-64 bg-[#080c14] border-r border-slate-800 fixed h-full z-40 p-4 space-y-4 text-center">
                        <div className="hidden md:block py-6 text-orange-500 font-black italic uppercase text-lg">SALA DO TEMPO</div>
                        <button onClick={()=>setAba('dashboard')} className={`w-full p-4 rounded-xl flex items-center justify-center md:justify-start gap-4 ${aba==='dashboard'?'bg-orange-500 text-white':'text-slate-500'}`}>
                            📊 <span className="hidden md:block font-bold">Painel</span>
                        </button>
                        <button onClick={()=>setAba('planejar')} className={`w-full p-4 rounded-xl flex items-center justify-center md:justify-start gap-4 ${aba==='planejar'?'bg-orange-500 text-white':'text-slate-500'}`}>
                            📅 <span className="hidden md:block font-bold">Cronograma</span>
                        </button>
                    </aside>

                    <main className="flex-1 ml-20 md:ml-64 p-6 md:p-10">
                        {aba === 'dashboard' ? (
                            <div className="max-w-5xl mx-auto space-y-8">
                                <h2 className="text-3xl font-black italic underline decoration-orange-500 decoration-4">MEU PROGRESSO</h2>
                                <div className="glass-card rounded-[2rem] overflow-hidden border border-slate-800">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-900/80 text-slate-500 uppercase text-[10px] font-black tracking-widest">
                                            <tr><th className="p-6">Meta</th><th className="p-6">Disciplina</th><th className="p-6 text-center">Tempo</th><th className="p-6 text-right">Ação</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {plano.length === 0 ? (
                                                <tr><td colSpan="4" className="p-20 text-center text-slate-600 font-bold uppercase italic tracking-tighter">O cronograma está vazio. Vá em Metas para começar!</td></tr>
                                            ) : plano.map(p => {
                                                const exec = sessoes.filter(s => s.cronograma_id === p.id);
                                                const tempo = exec.reduce((a,b)=>a+b.tempo, 0);
                                                return (
                                                    <tr key={p.id} className="hover:bg-white/[0.02]">
                                                        <td className="p-6 text-orange-500 font-black">M{p.meta}</td>
                                                        <td className="p-6 font-bold">{p.disciplina}<br/><span className="text-[10px] text-slate-500 font-normal uppercase italic">{p.assunto}</span></td>
                                                        <td className="p-6 text-center font-mono text-orange-200">{tempo} min</td>
                                                        <td className="p-6 text-right"><button onClick={()=>setTarefaAtiva(p)} className="bg-orange-500 hover:scale-110 transition-transform p-3 rounded-xl shadow-lg shadow-orange-500/20">▶</button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-xl mx-auto space-y-8">
                                <h2 className="text-3xl font-black italic underline decoration-orange-500 decoration-4">NOVA META</h2>
                                <form onSubmit={handleSalvarCronograma} className="glass-card p-8 rounded-[2.5rem] space-y-4 border border-slate-800">
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="meta" type="number" placeholder="Nº Meta" className="bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 font-bold" required />
                                        <select name="tipo" className="bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 font-bold text-slate-400">
                                            <option>Teoria</option><option>Questões</option><option>Revisão</option>
                                        </select>
                                    </div>
                                    <select name="disciplina" className="w-full bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 font-bold text-slate-400">
                                        {DISCIPLINAS.map(d=><option key={d}>{d}</option>)}
                                    </select>
                                    <input name="assunto" placeholder="Assunto (ex: Contratos)" className="w-full bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 font-bold" required />
                                    <button className="w-full bg-orange-500 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-orange-400 transition-colors">Cadastrar no Sistema</button>
                                </form>
                            </div>
                        )}
                    </main>

                    {tarefaAtiva && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
                            <div className="bg-[#0b0f1a] w-full max-w-sm p-10 rounded-[3rem] border border-orange-500/30">
                                <h3 className="text-xl font-black mb-1">{tarefaAtiva.disciplina}</h3>
                                <p className="text-orange-500 text-[10px] font-black mb-8 italic uppercase">{tarefaAtiva.assunto}</p>
                                <form onSubmit={salvarSessao} className="space-y-4">
                                    <input name="tempo" type="number" placeholder="Minutos" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800" required />
                                    <input name="total" type="number" placeholder="Questões Totais" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800" />
                                    <input name="certas" type="number" placeholder="Acertos" className="w-full bg-slate-900 p-4 rounded-2xl border border-emerald-900/30" />
                                    <button className="w-full bg-orange-500 py-5 rounded-2xl font-black">SALVAR</button>
                                    <button type="button" onClick={()=>setTarefaAtiva(null)} className="w-full text-slate-600 font-bold text-[10px] uppercase pt-2">Cancelar</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
