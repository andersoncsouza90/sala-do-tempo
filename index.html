<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala do Tempo - Full Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: white; margin: 0; overflow-x: hidden; }
        .glass-card { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .orange-glow { box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
        select option { background: #0f172a; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

        // Configuração Supabase
        const SUPABASE_URL = 'https://sflzuzorlmddprbkdczv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_3viV5YSChpIMXYHAz-e-5g_GzP1d0E8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DISCIPLINAS = ["Português", "Matemática Financeira", "Estatística", "Direito Tributário", "LTE", "Contabilidade Geral", "Contabilidade de Custos", "Auditoria", "TI", "Direito Constitucional", "Direito Administrativo", "Direito Civil", "Direito Empresarial", "Direito Penal", "Administração Geral e Pública"];

        function App() {
            const [aba, setAba] = useState('dashboard');
            const [plano, setPlano] = useState([]);
            const [sessoes, setSessoes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tarefaAtiva, setTarefaAtiva] = useState(null);
            const [editando, setEditando] = useState(null);
            const [filtroMeta, setFiltroMeta] = useState('Todas');

            useEffect(() => { fetchData(); }, []);

            async function fetchData() {
                try {
                    const { data: cron } = await supabaseClient.from('cronograma').select('*').order('meta', { ascending: true });
                    const { data: sess } = await supabaseClient.from('sessoes').select('*');
                    setPlano(cron || []);
                    setSessoes(sess || []);
                } finally { setLoading(false); }
            }

            // SALVAR OU EDITAR META
            async function handleSalvarMeta(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const dados = {
                    meta: parseInt(fd.get('meta')),
                    disciplina: fd.get('disciplina'),
                    assunto: fd.get('assunto'),
                    status: fd.get('tipo')
                };

                let res;
                if (editando) {
                    res = await supabaseClient.from('cronograma').update(dados).eq('id', editando.id);
                } else {
                    res = await supabaseClient.from('cronograma').insert([dados]);
                }

                if (!res.error) {
                    alert("Sucesso!");
                    setEditando(null);
                    fetchData();
                    e.target.reset();
                } else {
                    alert("Erro: " + res.error.message);
                }
            }

            // REGISTRAR ESTUDO
            async function handleSalvarSessao(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const payload = {
                    cronograma_id: tarefaAtiva.id,
                    meta: tarefaAtiva.meta,
                    disciplina: tarefaAtiva.disciplina,
                    assunto: tarefaAtiva.assunto,
                    tempo: parseInt(fd.get('tempo')) || 0,
                    total: parseInt(fd.get('total')) || 0,
                    certas: parseInt(fd.get('certas')) || 0,
                    tipo: tarefaAtiva.status
                };

                const { error } = await supabaseClient.from('sessoes').insert([payload]);
                if (!error) {
                    setTarefaAtiva(null);
                    fetchData();
                }
            }

            // CÁLCULOS DO DASHBOARD
            const dadosEvolucao = useMemo(() => {
                const metasUnicas = [...new Set(plano.map(p => p.meta))].sort((a,b) => a-b);
                return metasUnicas.map(m => ({
                    name: `M${m}`,
                    horas: sessoes.filter(s => s.meta === m).reduce((acc, curr) => acc + (curr.tempo / 60), 0).toFixed(1)
                }));
            }, [sessoes, plano]);

            const acumuladoDisciplinas = useMemo(() => {
                const resumo = {};
                sessoes.forEach(s => {
                    if (!resumo[s.disciplina]) resumo[s.disciplina] = { tempo: 0, questoes: 0, acertos: 0 };
                    resumo[s.disciplina].tempo += s.tempo;
                    resumo[s.disciplina].questoes += s.total;
                    resumo[s.disciplina].acertos += s.certas;
                });
                return Object.entries(resumo).map(([nome, d]) => ({
                    nome, ...d,
                    perc: d.questoes > 0 ? Math.round((d.acertos/d.questoes)*100) : 0
                }));
            }, [sessoes]);

            const listaMetas = ['Todas', ...new Set(plano.map(p => p.meta))].sort((a,b)=>a-b);

            if (loading) return <div className="h-screen flex items-center justify-center text-orange-500 font-black italic">CONECTANDO À SALA DO TEMPO...</div>;

            return (
                <div className="flex min-h-screen">
                    {/* MENU LATERAL */}
                    <aside className="w-20 md:w-64 bg-[#080c14] border-r border-slate-800 fixed h-full z-40 p-4">
                        <div className="hidden md:block py-8 text-orange-500 font-black italic text-xl text-center">SALA DO TEMPO</div>
                        <nav className="space-y-4">
                            <button onClick={()=>setAba('dashboard')} className={`w-full p-4 rounded-2xl flex gap-4 ${aba==='dashboard'?'bg-orange-500 text-white orange-glow':'text-slate-500 hover:text-white'}`}>
                                <span>📊</span> <span className="hidden md:block font-bold">Dashboard</span>
                            </button>
                            <button onClick={()=>setAba('planejar')} className={`w-full p-4 rounded-2xl flex gap-4 ${aba==='planejar'?'bg-orange-500 text-white orange-glow':'text-slate-500 hover:text-white'}`}>
                                <span>📅</span> <span className="hidden md:block font-bold">Cronograma</span>
                            </button>
                        </nav>
                    </aside>

                    {/* CONTEÚDO PRINCIPAL */}
                    <main className="flex-1 ml-20 md:ml-64 p-6 md:p-10">
                        {aba === 'dashboard' ? (
                            <div className="max-w-6xl mx-auto space-y-8">
                                <header className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <h2 className="text-3xl font-black italic">EVOLUÇÃO <span className="text-orange-500 underline">PRO</span></h2>
                                    <div className="bg-slate-900 border border-slate-800 p-2 rounded-2xl flex items-center gap-3">
                                        <span className="text-[10px] font-black text-slate-500 uppercase px-2">Focar na:</span>
                                        <select value={filtroMeta} onChange={(e)=>setFiltroMeta(e.target.value)} className="bg-orange-500 text-white font-black px-4 py-2 rounded-xl outline-none cursor-pointer">
                                            {listaMetas.map(m => <option key={m} value={m}>{m === 'Todas' ? 'Visão Geral' : `Meta ${m}`}</option>)}
                                        </select>
                                    </div>
                                </header>

                                {/* GRÁFICO DE LINHA */}
                                <div className="glass-card p-8 rounded-[2.5rem] h-80 border border-slate-800/50">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Horas por Meta (Evolução)</h3>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={dadosEvolucao}>
                                            <defs>
                                                <linearGradient id="colorHr" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor="#f97316" stopOpacity={0.3}/>
                                                    <stop offset="95%" stopColor="#f97316" stopOpacity={0}/>
                                                </linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                            <XAxis dataKey="name" stroke="#475569" fontSize={10} fontWeight="bold" />
                                            <YAxis stroke="#475569" fontSize={10} />
                                            <Tooltip contentStyle={{backgroundColor: '#0b0f1a', border: '1px solid #1e293b', borderRadius: '12px'}} />
                                            <Area type="monotone" dataKey="horas" stroke="#f97316" strokeWidth={4} fillOpacity={1} fill="url(#colorHr)" />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* CARDS DE DISCIPLINAS ACUMULADAS */}
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    {acumuladoDisciplinas.map(d => (
                                        <div key={d.nome} className="glass-card p-5 rounded-3xl border-t-2 border-orange-500/30">
                                            <p className="text-[10px] font-black text-slate-500 uppercase mb-1">{d.nome}</p>
                                            <div className="flex justify-between items-end">
                                                <span className="text-xl font-black text-orange-500">{d.perc}% <small className="text-[10px] text-slate-400 font-normal">acerto</small></span>
                                                <span className="text-[10px] font-mono text-slate-500">{Math.round(d.tempo/60)}h total</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* TABELA DE ATIVIDADES DA META */}
                                <div className="glass-card rounded-[2.5rem] overflow-hidden border border-slate-800/50">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-900/80 text-slate-500 uppercase text-[10px] font-black">
                                            <tr><th className="p-6">Meta</th><th className="p-6">Disciplina / Assunto</th><th className="p-6 text-center">Tempo</th><th className="p-6 text-right">Ação</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {plano.filter(p => filtroMeta === 'Todas' || p.meta === parseInt(filtroMeta)).map(p => {
                                                const tempo = sessoes.filter(s => s.cronograma_id === p.id).reduce((a,b)=>a+b.tempo, 0);
                                                return (
                                                    <tr key={p.id} className="hover:bg-white/[0.02] transition-colors group">
                                                        <td className="p-6 text-orange-500 font-black italic">M{p.meta}</td>
                                                        <td className="p-6 font-bold">{p.disciplina}<br/><span className="text-[10px] text-slate-500 font-normal uppercase italic">{p.assunto}</span></td>
                                                        <td className="p-6 text-center font-mono text-slate-300">{tempo}m</td>
                                                        <td className="p-6 text-right"><button onClick={()=>setTarefaAtiva(p)} className="bg-orange-500 p-3 rounded-xl hover:scale-110 transition-transform">▶</button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            /* ABA DE CRONOGRAMA (COM EDIÇÃO) */
                            <div className="max-w-2xl mx-auto space-y-10">
                                <h2 className="text-3xl font-black italic uppercase">Gestão de <span className="text-orange-500">Metas</span></h2>
                                
                                <form onSubmit={handleSalvarMeta} className="glass-card p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Nº Meta</label>
                                            <input name="meta" type="number" defaultValue={editando?.meta} placeholder="Ex: 1" className="w-full bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 focus:border-orange-500 transition-colors font-bold" required />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Tipo</label>
                                            <select name="tipo" defaultValue={editando?.status} className="w-full bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 font-bold">
                                                <option>Teoria</option><option>Questões</option><option>Revisão</option>
                                            </select>
                                        </div>
                                    </div>
                                    <select name="disciplina" defaultValue={editando?.disciplina} className="w-full bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 font-bold">
                                        {DISCIPLINAS.map(d=><option key={d}>{d}</option>)}
                                    </select>
                                    <input name="assunto" defaultValue={editando?.assunto} placeholder="Assunto específico" className="w-full bg-slate-950 p-4 rounded-2xl outline-none border border-slate-800 font-bold" required />
                                    
                                    <button type="submit" className="w-full bg-orange-500 py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-orange-500/20">
                                        {editando ? 'Atualizar Dados' : 'Criar Nova Meta'}
                                    </button>
                                    {editando && <button type="button" onClick={()=>setEditando(null)} className="w-full text-slate-500 font-bold text-[10px] uppercase">Cancelar Edição</button>}
                                </form>

                                <div className="space-y-4 pb-20">
                                    {plano.map(t => (
                                        <div key={t.id} className="glass-card p-6 rounded-3xl border border-slate-800 flex justify-between items-center group hover:border-orange-500/40 transition-colors">
                                            <div>
                                                <span className="text-[10px] font-black text-orange-500 italic uppercase">Meta {t.meta}</span>
                                                <h4 className="font-bold text-slate-200">{t.disciplina}</h4>
                                                <p className="text-[10px] text-slate-500 uppercase">{t.assunto}</p>
                                            </div>
                                            <button onClick={()=>setEditando(t)} className="text-slate-600 hover:text-orange-500 p-2 text-xl">✎</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL REGISTRO DE ESTUDO */}
                    {tarefaAtiva && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                            <div className="bg-[#0b0f1a] w-full max-w-sm p-10 rounded-[3rem] border border-orange-500/30 shadow-2xl">
                                <h3 className="text-xl font-black mb-1">{tarefaAtiva.disciplina}</h3>
                                <p className="text-orange-500 text-[10px] font-black mb-8 italic uppercase tracking-tighter">{tarefaAtiva.assunto}</p>
                                <form onSubmit={handleSalvarSessao} className="space-y-6">
                                    <input name="tempo" type="number" placeholder="Minutos estudados" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 font-bold" required />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="total" type="number" placeholder="Qtd Questões" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 font-bold" />
                                        <input name="certas" type="number" placeholder="Acertos" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 text-emerald-400 font-bold" />
                                    </div>
                                    <button className="w-full bg-orange-500 py-5 rounded-2xl font-black uppercase shadow-lg shadow-orange-500/20">Finalizar Estudo</button>
                                    <button type="button" onClick={()=>setTarefaAtiva(null)} className="w-full text-slate-600 font-bold text-[10px] uppercase pt-2">Voltar</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
