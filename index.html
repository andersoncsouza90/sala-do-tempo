<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala do Tempo - Pro v3</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: white; margin: 0; }
        .glass-card { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

        const SUPABASE_URL = 'https://sflzuzorlmddprbkdczv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_3viV5YSChpIMXYHAz-e-5g_GzP1d0E8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DISCIPLINAS = ["Português", "Matemática Financeira", "Estatística", "Direito Tributário", "LTE", "Contabilidade Geral", "Contabilidade de Custos", "Auditoria", "TI", "Direito Constitucional", "Direito Administrativo", "Direito Civil", "Direito Empresarial", "Direito Penal", "Administração Geral e Pública"];

        function App() {
            const [aba, setAba] = useState('dashboard');
            const [plano, setPlano] = useState([]);
            const [sessoes, setSessoes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tarefaAtiva, setTarefaAtiva] = useState(null);
            const [editando, setEditando] = useState(null);
            const [metaFiltro, setMetaFiltro] = useState('Todas');

            useEffect(() => { fetchData(); }, []);

            async function fetchData() {
                const { data: cron } = await supabase.from('cronograma').select('*').order('meta', { ascending: true });
                const { data: sess } = await supabase.from('sessoes').select('*');
                setPlano(cron || []);
                setSessoes(sess || []);
                setLoading(false);
            }

            async function salvarTarefa(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const dados = {
                    meta: parseInt(fd.get('meta')),
                    disciplina: fd.get('disciplina'),
                    assunto: fd.get('assunto'),
                    status: fd.get('tipo')
                };

                const res = editando 
                    ? await supabase.from('cronograma').update(dados).eq('id', editando.id)
                    : await supabase.from('cronograma').insert([dados]);
                
                if (!res.error) {
                    setEditando(null);
                    fetchData();
                    e.target.reset();
                }
            }

            async function registrarSessao(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const payload = {
                    cronograma_id: tarefaAtiva.id,
                    meta: tarefaAtiva.meta,
                    disciplina: tarefaAtiva.disciplina,
                    assunto: tarefaAtiva.assunto,
                    tempo: parseInt(fd.get('tempo')) || 0,
                    total: parseInt(fd.get('total')) || 0,
                    certas: parseInt(fd.get('certas')) || 0,
                    tipo: tarefaAtiva.status
                };
                const { error } = await supabase.from('sessoes').insert([payload]);
                if (!error) { setTarefaAtiva(null); fetchData(); }
            }

            // LÓGICA DE DADOS ACUMULADOS
            const statsPorDisciplina = useMemo(() => {
                const map = {};
                sessoes.forEach(s => {
                    if (!map[s.disciplina]) map[s.disciplina] = { tempo: 0, total: 0, certas: 0 };
                    map[s.disciplina].tempo += s.tempo;
                    map[s.disciplina].total += s.total;
                    map[s.disciplina].certas += s.certas;
                });
                return Object.entries(map).map(([nome, d]) => ({
                    nome, ...d,
                    perc: d.total > 0 ? Math.round((d.certas/d.total)*100) : 0
                }));
            }, [sessoes]);

            const dadosGrafico = useMemo(() => {
                const metas = [...new Set(plano.map(p => p.meta))].sort((a,b)=>a-b);
                return metas.map(m => ({
                    name: `M${m}`,
                    horas: sessoes.filter(s => s.meta === m).reduce((acc, curr) => acc + (curr.tempo / 60), 0)
                }));
            }, [sessoes, plano]);

            const metasDisponiveis = useMemo(() => ['Todas', ...new Set(plano.map(p => p.meta))].sort((a,b)=>a-b), [plano]);

            if (loading) return <div className="h-screen flex items-center justify-center text-orange-500 font-black animate-pulse">SALA DO TEMPO</div>;

            return (
                <div className="flex min-h-screen bg-[#05070a]">
                    {/* SIDEBAR */}
                    <aside className="w-20 md:w-64 bg-[#080c14] border-r border-slate-800 fixed h-full z-40 p-4">
                        <div className="hidden md:block py-10 text-orange-500 font-black italic uppercase text-2xl text-center">Sala do Tempo</div>
                        <nav className="space-y-4">
                            <button onClick={()=>setAba('dashboard')} className={`w-full p-4 rounded-2xl flex gap-4 ${aba==='dashboard'?'bg-orange-500 text-white shadow-lg shadow-orange-500/20':'text-slate-500'}`}>📊 <span className="hidden md:block font-bold">Painel</span></button>
                            <button onClick={()=>setAba('planejar')} className={`w-full p-4 rounded-2xl flex gap-4 ${aba==='planejar'?'bg-orange-500 text-white shadow-lg shadow-orange-500/20':'text-slate-500'}`}>📅 <span className="hidden md:block font-bold">Metas</span></button>
                        </nav>
                    </aside>

                    <main className="flex-1 ml-20 md:ml-64 p-6 md:p-10 custom-scroll overflow-y-auto">
                        {aba === 'dashboard' ? (
                            <div className="max-w-6xl mx-auto space-y-10 pb-20">
                                <header className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div>
                                        <h2 className="text-4xl font-black italic">DASHBOARD</h2>
                                        <p className="text-slate-500 font-bold uppercase text-xs tracking-widest">Performance & Evolução</p>
                                    </div>
                                    <div className="flex items-center gap-3 bg-slate-900 p-2 rounded-2xl border border-slate-800">
                                        <span className="text-[10px] font-black text-slate-500 uppercase px-2">Meta em Foco:</span>
                                        <select value={metaFiltro} onChange={(e)=>setMetaFiltro(e.target.value)} className="bg-orange-500 text-white font-black rounded-xl px-4 py-2 outline-none">
                                            {metasDisponiveis.map(m => <option key={m} value={m}>{m === 'Todas' ? 'Ver Todas' : `Meta ${m}`}</option>)}
                                        </select>
                                    </div>
                                </header>

                                {/* GRÁFICO DE EVOLUÇÃO */}
                                <div className="glass-card p-8 rounded-[2.5rem] h-72 border border-slate-800 shadow-2xl">
                                    <h3 className="text-xs font-black text-slate-500 uppercase mb-6 tracking-tighter">Horas de Estudo por Meta</h3>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={dadosGrafico}>
                                            <defs>
                                                <linearGradient id="colorHr" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor="#f97316" stopOpacity={0.3}/>
                                                    <stop offset="95%" stopColor="#f97316" stopOpacity={0}/>
                                                </linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                            <XAxis dataKey="name" stroke="#475569" fontSize={10} fontWeight="bold" />
                                            <YAxis stroke="#475569" fontSize={10} />
                                            <Tooltip contentStyle={{backgroundColor: '#0b0f1a', border: 'none', borderRadius: '12px'}} />
                                            <Area type="monotone" dataKey="horas" stroke="#f97316" strokeWidth={4} fillOpacity={1} fill="url(#colorHr)" />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* CARDS DISCIPLINAS (ACUMULADO) */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {statsPorDisciplina.map(d => (
                                        <div key={d.nome} className="glass-card p-6 rounded-3xl border-l-4 border-orange-500">
                                            <h4 className="font-black text-slate-200 truncate">{d.nome}</h4>
                                            <div className="flex justify-between mt-4">
                                                <div><p className="text-[10px] text-slate-500 font-bold uppercase">Tempo</p><p className="font-mono text-orange-400">{d.tempo}m</p></div>
                                                <div><p className="text-[10px] text-slate-500 font-bold uppercase">Questões</p><p className="font-mono text-slate-300">{d.total}</p></div>
                                                <div><p className="text-[10px] text-slate-500 font-bold uppercase">Acerto</p><p className={`font-black ${d.perc >= 75 ? 'text-emerald-500' : 'text-orange-500'}`}>{d.perc}%</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* TABELA FILTRADA */}
                                <div className="glass-card rounded-[2.5rem] overflow-hidden border border-slate-800">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-900/50 text-slate-500 uppercase text-[10px] font-black italic">
                                            <tr><th className="p-6">Meta</th><th className="p-6">Disciplina</th><th className="p-6 text-center">Tempo Acumulado</th><th className="p-6 text-right">Ação</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {plano.filter(p => metaFiltro === 'Todas' || p.meta === parseInt(metaFiltro)).map(p => {
                                                const exec = sessoes.filter(s => s.cronograma_id === p.id);
                                                const tempo = exec.reduce((a,b)=>a+b.tempo, 0);
                                                return (
                                                    <tr key={p.id} className="hover:bg-white/[0.02] transition-all group">
                                                        <td className="p-6 text-orange-500 font-black italic">#{p.meta}</td>
                                                        <td className="p-6"><span className="font-bold block">{p.disciplina}</span><span className="text-[10px] text-slate-500 font-normal uppercase italic">{p.assunto}</span></td>
                                                        <td className="p-6 text-center font-mono font-bold text-slate-300">{tempo} min</td>
                                                        <td className="p-6 text-right"><button onClick={()=>setTarefaAtiva(p)} className="bg-orange-500 p-3 rounded-xl shadow-lg shadow-orange-500/20 hover:scale-110 transition-transform">▶</button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            /* ABA PLANEJAR COM EDIÇÃO */
                            <div className="max-w-2xl mx-auto space-y-10">
                                <div><h2 className="text-3xl font-black italic uppercase">Gestão de <span className="text-orange-500">Metas</span></h2></div>
                                
                                <form onSubmit={salvarTarefa} className="glass-card p-8 rounded-[2.5rem] grid grid-cols-2 gap-6 border border-slate-800 shadow-2xl">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Nº Meta</label>
                                        <input name="meta" type="number" defaultValue={editando?.meta} className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none font-bold text-orange-500" required />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Tipo</label>
                                        <select name="tipo" defaultValue={editando?.status} className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none font-bold text-slate-400">
                                            <option>Teoria</option><option>Questões</option><option>Revisão</option>
                                        </select>
                                    </div>
                                    <div className="col-span-2 space-y-1">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Disciplina</label>
                                        <select name="disciplina" defaultValue={editando?.disciplina} className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none font-bold text-slate-400">
                                            {DISCIPLINAS.map(d=><option key={d}>{d}</option>)}
                                        </select>
                                    </div>
                                    <div className="col-span-2 space-y-1">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Assunto Específico</label>
                                        <input name="assunto" defaultValue={editando?.assunto} className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none font-bold placeholder-slate-700" placeholder="Ex: Direitos Fundamentais" required />
                                    </div>
                                    <button className="col-span-2 bg-orange-500 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-orange-400 transition-all">
                                        {editando ? 'Atualizar Tarefa' : 'Adicionar ao Plano'}
                                    </button>
                                    {editando && <button type="button" onClick={()=>setEditando(null)} className="col-span-2 text-xs text-slate-500 font-bold uppercase underline">Cancelar Edição</button>}
                                </form>

                                <div className="space-y-4 pb-20">
                                    <h3 className="text-xs font-black text-slate-600 uppercase ml-4">Tarefas Cadastradas</h3>
                                    {plano.map(t => (
                                        <div key={t.id} className="glass-card p-6 rounded-3xl border border-slate-800 flex justify-between items-center group transition-all hover:border-orange-500/50">
                                            <div>
                                                <span className="text-[10px] font-black text-orange-500 italic">META {t.meta}</span>
                                                <h4 className="font-bold text-slate-200">{t.disciplina}</h4>
                                                <p className="text-xs text-slate-500 italic uppercase">{t.assunto}</p>
                                            </div>
                                            <button onClick={()=>setEditando(t)} className="text-slate-600 hover:text-orange-500 p-2"><i className="text-xl">✎</i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL REGISTRO */}
                    {tarefaAtiva && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4 backdrop-blur-md">
                            <div className="bg-[#0b0f1a] w-full max-w-sm p-10 rounded-[3rem] border border-orange-500/30 shadow-2xl animate-in zoom-in-95 duration-200">
                                <h3 className="text-xl font-black mb-1">{tarefaAtiva.disciplina}</h3>
                                <p className="text-orange-500 text-[10px] font-black mb-8 italic uppercase tracking-widest">{tarefaAtiva.assunto}</p>
                                <form onSubmit={registrarSessao} className="space-y-6">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-600 uppercase ml-2">Tempo (minutos)</label>
                                        <input name="tempo" type="number" autoFocus className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 font-bold outline-none focus:border-orange-500" required />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-600 uppercase ml-2">Questões</label>
                                            <input name="total" type="number" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 font-bold outline-none" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-600 uppercase ml-2">Certas</label>
                                            <input name="certas" type="number" className="w-full bg-slate-900 p-4 rounded-2xl border border-emerald-950/40 text-emerald-400 font-bold outline-none" />
                                        </div>
                                    </div>
                                    <button className="w-full bg-orange-500 py-5 rounded-2xl font-black shadow-lg shadow-orange-500/30">CONCLUIR SESSÃO</button>
                                    <button type="button" onClick={()=>setTarefaAtiva(null)} className="w-full text-slate-600 font-bold text-[10px] uppercase pt-2">Cancelar</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
