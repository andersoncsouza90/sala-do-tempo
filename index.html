<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sala do Tempo - Emergency Fix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
</head>
<body class="bg-[#0b0f1a] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuração Supabase
        const SUPABASE_URL = 'https://sflzuzorlmddprbkdczv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_3viV5YSChpIMXYHAz-e-5g_GzP1d0E8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [aba, setAba] = useState('dashboard');
            const [plano, setPlano] = useState([]);
            const [loading, setLoading] = useState(true);
            const [erro, setErro] = useState(null);

            useEffect(() => {
                async function load() {
                    try {
                        const { data, error } = await supabase.from('cronograma').select('*');
                        if (error) throw error;
                        setPlano(data || []);
                    } catch (e) {
                        setErro(e.message);
                    } finally {
                        setLoading(false);
                    }
                }
                load();
            }, []);

            if (loading) return <div className="flex h-screen items-center justify-center">Carregando...</div>;

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar Simples */}
                    <aside className="w-64 bg-slate-900 p-6 border-r border-slate-800">
                        <h1 className="text-orange-500 font-black text-xl mb-10 italic">SALA DO TEMPO</h1>
                        <nav className="space-y-4">
                            <button onClick={() => setAba('dashboard')} className={`w-full text-left p-3 rounded ${aba === 'dashboard' ? 'bg-orange-500' : 'text-slate-400'}`}>Dashboard</button>
                            <button onClick={() => setAba('planejar')} className={`w-full text-left p-3 rounded ${aba === 'planejar' ? 'bg-orange-500' : 'text-slate-400'}`}>Planejar</button>
                        </nav>
                        {erro && <div className="mt-10 text-xs text-red-500 bg-red-500/10 p-2 rounded">Erro: {erro}</div>}
                    </aside>

                    {/* Conteúdo */}
                    <main className="flex-1 p-10">
                        {aba === 'dashboard' ? (
                            <div>
                                <h2 className="text-3xl font-black mb-6">Dashboard</h2>
                                <div className="bg-slate-900 rounded-xl p-6 border border-slate-800">
                                    <table className="w-full">
                                        <thead>
                                            <tr className="text-slate-500 text-xs uppercase text-left">
                                                <th className="p-3">Meta</th>
                                                <th className="p-3">Disciplina</th>
                                                <th className="p-3">Assunto</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {plano.map(item => (
                                                <tr key={item.id} className="border-t border-slate-800">
                                                    <td className="p-3 text-orange-500 font-bold">{item.meta}</td>
                                                    <td className="p-3">{item.disciplina}</td>
                                                    <td className="p-3">{item.assunto}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    {plano.length === 0 && <p className="p-10 text-center text-slate-500">Nenhuma tarefa encontrada.</p>}
                                </div>
                            </div>
                        ) : (
                            <div>
                                <h2 className="text-3xl font-black mb-6">Novo Planejamento</h2>
                                <p className="text-slate-400">Aqui irá o formulário...</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
