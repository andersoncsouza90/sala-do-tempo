<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala do Tempo - Sidebar Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CREDENCIAIS ---
        const SUPABASE_URL = 'https://sflzuzorlmddprbkdczv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_3viV5YSChpIMXYHAz-e-5g_GzP1d0E8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DISCIPLINAS = ["Português", "Matemática Financeira", "Estatística", "Direito Tributário", "LTE", "Contabilidade Geral", "Contabilidade de Custos", "Auditoria", "TI", "Direito Constitucional", "Direito Administrativo", "Direito Civil", "Direito Empresarial", "Direito Penal", "Administração Geral e Pública"];
        const CATEGORIAS = ["Teoria", "Questões", "Teste", "Revisão", "Simulado"];

        function App() {
            const [sessoes, setSessoes] = useState([]);
            const [aba, setAba] = useState('dashboard');
            const [loading, setLoading] = useState(true);

            useEffect(() => { fetchData(); }, []);

            async function fetchData() {
                setLoading(true);
                const { data } = await supabase.from('sessoes').select('*').order('created_at', { ascending: false });
                if (data) setSessoes(data);
                setLoading(false);
            }

            async function salvarSessao(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const nova = {
                    meta: parseInt(fd.get('meta')),
                    disciplina: fd.get('disciplina'),
                    tipo: fd.get('tipo'),
                    assunto: fd.get('assunto'),
                    tempo: parseInt(fd.get('tempo')),
                    total: parseInt(fd.get('total') || 0),
                    certas: parseInt(fd.get('certas') || 0)
                };
                const { error } = await supabase.from('sessoes').insert([nova]);
                if (!error) { fetchData(); setAba('dashboard'); }
            }

            async function excluirSessao(id) {
                if(confirm("Excluir permanentemente?")) {
                    const { error } = await supabase.from('sessoes').delete().eq('id', id);
                    if (!error) fetchData();
                }
            }

            const exportarCSV = () => {
                const header = "Meta,Disciplina,Tipo,Assunto,Tempo(min),Total_Q,Certas\n";
                const rows = sessoes.map(s => `${s.meta},${s.disciplina},${s.tipo},${s.assunto},${s.tempo},${s.total},${s.certas}`).join("\n");
                const blob = new Blob([header + rows], { type: 'text/csv' });
                window.open(URL.createObjectURL(blob));
            };

            const statsPorMeta = useMemo(() => {
                const metas = Array.from({ length: 14 }, (_, i) => ({ n: i + 1, min: 0 }));
                sessoes.forEach(s => { if(metas[s.meta-1]) metas[s.meta-1].min += s.tempo; });
                return metas;
            }, [sessoes]);

            if (loading) return <div className="flex h-screen items-center justify-center font-black text-orange-500 animate-pulse tracking-tighter text-2xl">SALA DO TEMPO...</div>;

            return (
                <div className="flex min-h-screen">
                    {/* SIDEBAR */}
                    <aside className="w-20 md:w-64 bg-slate-900 border-r border-slate-800 flex flex-col fixed h-full z-50">
                        <div className="p-6 flex items-center gap-3">
                            <div className="bg-orange-500 p-2 rounded-xl shadow-lg shadow-orange-500/20">
                                <i className="lucide-flame text-slate-900 w-6 h-6"></i>
                            </div>
                            <span className="font-black text-lg hidden md:block tracking-tighter italic">SALA DO TEMPO</span>
                        </div>

                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setAba('dashboard')} 
                                className={`w-full flex items-center gap-4 p-3 rounded-xl font-bold transition-all ${aba === 'dashboard' ? 'bg-orange-500 text-slate-900 shadow-lg shadow-orange-500/20' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <i className="lucide-layout-dashboard"></i>
                                <span className="hidden md:block">Dashboard</span>
                            </button>
                            
                            <button onClick={() => setAba('novo')} 
                                className={`w-full flex items-center gap-4 p-3 rounded-xl font-bold transition-all ${aba === 'novo' ? 'bg-orange-500 text-slate-900 shadow-lg shadow-orange-500/20' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <i className="lucide-plus-circle"></i>
                                <span className="hidden md:block">Novo Registro</span>
                            </button>

                            <button onClick={exportarCSV} 
                                className="w-full flex items-center gap-4 p-3 rounded-xl font-bold text-slate-400 hover:bg-slate-800 hover:text-white transition-all">
                                <i className="lucide-download"></i>
                                <span className="hidden md:block">Exportar Backup</span>
                            </button>
                        </nav>

                        <div className="p-4 border-t border-slate-800">
                            <div className="bg-slate-800/50 p-3 rounded-2xl hidden md:block">
                                <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Meta de 14 Semanas</p>
                                <div className="w-full bg-slate-700 h-1.5 rounded-full mt-2 overflow-hidden">
                                    <div className="bg-orange-500 h-full" style={{width: `${(Math.max(...sessoes.map(s=>s.meta), 0)/14)*100}%`}}></div>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* CONTEÚDO PRINCIPAL (DESLOCADO PELA SIDEBAR) */}
                    <main className="flex-1 ml-20 md:ml-64 p-4 md:p-10">
                        {aba === 'dashboard' ? (
                            <div className="max-w-5xl mx-auto space-y-8">
                                <header>
                                    <h2 className="text-3xl font-black text-white">Bem-vindo, <span className="text-orange-500">Guerreiro.</span></h2>
                                    <p className="text-slate-500 font-medium">Seu progresso nas 14 semanas está sendo monitorado.</p>
                                </header>

                                {/* Stats Cards */}
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                    <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="p-2 bg-orange-500/10 rounded-lg text-orange-500"><i className="lucide-clock"></i></div>
                                            <span className="text-[10px] font-black text-slate-500 uppercase">Horas Estudadas</span>
                                        </div>
                                        <p className="text-4xl font-black">{Math.floor(sessoes.reduce((acc,s)=>acc+s.tempo,0)/60)}<span className="text-lg text-slate-500 ml-1">h</span></p>
                                    </div>
                                    <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="p-2 bg-emerald-500/10 rounded-lg text-emerald-500"><i className="lucide-target"></i></div>
                                            <span className="text-[10px] font-black text-slate-500 uppercase">Acerto Geral</span>
                                        </div>
                                        <p className="text-4xl font-black text-emerald-400">
                                            {(() => {
                                                const t = sessoes.reduce((acc,s)=>acc+s.total,0);
                                                const c = sessoes.reduce((acc,s)=>acc+s.certas,0);
                                                return t > 0 ? Math.round((c/t)*100) : 0;
                                            })()}%
                                        </p>
                                    </div>
                                    <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="p-2 bg-indigo-500/10 rounded-lg text-indigo-500"><i className="lucide-layers"></i></div>
                                            <span className="text-[10px] font-black text-slate-500 uppercase">Meta Atual</span>
                                        </div>
                                        <p className="text-4xl font-black text-indigo-400">{sessoes.length > 0 ? Math.max(...sessoes.map(s=>s.meta)) : 1}<span className="text-lg text-slate-500">/14</span></p>
                                    </div>
                                </div>

                                {/* Gráfico de Metas */}
                                <section className="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-xl">
                                    <h3 className="text-sm font-black uppercase tracking-[0.2em] text-slate-500 mb-8 italic">Desempenho por Meta</h3>
                                    <div className="flex items-end gap-2 md:gap-4 h-48">
                                        {statsPorMeta.map(m => (
                                            <div key={m.n} className="flex-1 flex flex-col items-center gap-3 group">
                                                <div className="w-full bg-slate-800 rounded-2xl relative flex flex-col justify-end h-full overflow-hidden">
                                                    <div 
                                                        className="bg-gradient-to-t from-orange-600 to-orange-400 w-full rounded-t-xl transition-all duration-700 group-hover:brightness-125" 
                                                        style={{height: `${Math.min((m.min/60)*12, 100)}%`}}
                                                    ></div>
                                                </div>
                                                <span className="text-[10px] font-black text-slate-600 group-hover:text-orange-500 transition-colors uppercase">M{m.n}</span>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* Lista de Atividades */}
                                <section className="bg-slate-900 rounded-[2.5rem] border border-slate-800 shadow-xl overflow-hidden">
                                    <div className="p-6 border-b border-slate-800 flex justify-between items-center">
                                        <h3 className="font-black text-slate-300 uppercase text-xs tracking-widest italic">Registros Recentes</h3>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <tbody className="divide-y divide-slate-800/50">
                                                {sessoes.map(s => (
                                                    <tr key={s.id} className="hover:bg-slate-800/30 transition-colors group">
                                                        <td className="p-5">
                                                            <div className="flex items-center gap-4">
                                                                <div className="text-[10px] font-black bg-slate-800 text-orange-500 w-10 h-10 rounded-full flex items-center justify-center border border-slate-700">M{s.meta}</div>
                                                                <div>
                                                                    <p className="font-bold text-slate-200">{s.disciplina}</p>
                                                                    <p className="text-xs text-slate-500">{s.assunto}</p>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="p-5 text-right">
                                                            <div className="inline-block px-3 py-1 bg-slate-800 rounded-lg text-xs font-bold text-slate-400">{s.tempo} min</div>
                                                        </td>
                                                        <td className="p-5 text-right">
                                                            {s.total > 0 && (
                                                                <span className={`font-black ${Math.round((s.certas/s.total)*100) >= 75 ? 'text-emerald-500' : 'text-orange-500'}`}>
                                                                    {Math.round((s.certas/s.total)*100)}%
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="p-5 text-right">
                                                            <button onClick={() => excluirSessao(s.id)} className="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-rose-500 transition-all">
                                                                <i className="lucide-trash-2 w-5 h-5"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="max-w-2xl mx-auto py-10">
                                <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-2xl relative overflow-hidden">
                                    <div className="absolute -right-20 -top-20 w-64 h-64 bg-orange-500/5 rounded-full blur-3xl"></div>
                                    <h2 className="text-3xl font-black mb-8 flex items-center gap-4">
                                        <span className="p-3 bg-orange-500 rounded-2xl text-slate-900"><i className="lucide-edit-3"></i></span>
                                        Registrar Estudo
                                    </h2>

                                    <form onSubmit={salvarSessao} className="space-y-6 relative z-10">
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-xs font-black uppercase tracking-widest text-slate-500 ml-2">Qual Meta?</label>
                                                <select name="meta" className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 focus:border-orange-500 outline-none font-bold transition-all text-orange-500">
                                                    {Array.from({length:14}, (_,i)=><option key={i+1} value={i+1}>Semana {i+1}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-xs font-black uppercase tracking-widest text-slate-500 ml-2">Tipo de Atividade</label>
                                                <select name="tipo" className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 focus:border-orange-500 outline-none font-bold transition-all">
                                                    {CATEGORIAS.map(c=><option key={c}>{c}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        <div className="space-y-2">
                                            <label className="text-xs font-black uppercase tracking-widest text-slate-500 ml-2">Disciplina</label>
                                            <select name="disciplina" className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 focus:border-orange-500 outline-none font-bold transition-all">
                                                {DISCIPLINAS.map(d=><option key={d}>{d}</option>)}
                                            </select>
                                        </div>

                                        <div className="space-y-2">
                                            <label className="text-xs font-black uppercase tracking-widest text-slate-500 ml-2">O que você estudou hoje?</label>
                                            <input name="assunto" required placeholder="Ex: Atos Administrativos" className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 focus:border-orange-500 outline-none font-bold transition-all placeholder:text-slate-700" />
                                        </div>

                                        <div className="grid grid-cols-3 gap-4">
                                            <div className="space-y-2 text-center">
                                                <label className="text-[10px] font-black uppercase text-slate-500">Minutos</label>
                                                <input name="tempo" type="number" required placeholder="0" className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 focus:border-orange-500 outline-none font-bold text-center" />
                                            </div>
                                            <div className="space-y-2 text-center">
                                                <label className="text-[10px] font-black uppercase text-slate-500">Questões</label>
                                                <input name="total" type="number" placeholder="0" className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 focus:border-orange-500 outline-none font-bold text-center" />
                                            </div>
                                            <div className="space-y-2 text-center">
                                                <label className="text-[10px] font-black uppercase text-slate-500">Certas</label>
                                                <input name="certas" type="number" placeholder="0" className="w-full bg-slate-950 p-4 rounded-2xl border border-emerald-900 focus:border-emerald-500 outline-none font-bold text-center text-emerald-500" />
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full bg-orange-500 text-slate-950 py-5 rounded-[2rem] font-black text-xl shadow-xl shadow-orange-500/20 hover:scale-[1.02] active:scale-95 transition-all">
                                            SALVAR SESSÃO NO CLOUD
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
