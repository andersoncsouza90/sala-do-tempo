<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala do Tempo - Performance</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

        const SUPABASE_URL = 'https://sflzuzorlmddprbkdczv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_3viV5YSChpIMXYHAz-e-5g_GzP1d0E8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DISCIPLINAS = ["Português", "Matemática Financeira", "Estatística", "Direito Tributário", "LTE", "Contabilidade Geral", "Contabilidade de Custos", "Auditoria", "TI", "Direito Constitucional", "Direito Administrativo", "Direito Civil", "Direito Empresarial", "Direito Penal", "Administração Geral e Pública"];

        function App() {
            const [plano, setPlano] = useState([]);
            const [sessoes, setSessoes] = useState([]);
            const [aba, setAba] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [tarefaParaExecutar, setTarefaParaExecutar] = useState(null);
            const [editando, setEditando] = useState(null);

            useEffect(() => { fetchData(); }, []);

            async function fetchData() {
                setLoading(true);
                const { data: cron } = await supabase.from('cronograma').select('*').order('meta', { ascending: true });
                const { data: sess } = await supabase.from('sessoes').select('*');
                if (cron) setPlano(cron);
                if (sess) setSessoes(sess);
                setLoading(false);
            }

            // Salvar no Planejamento
            async function handlePlano(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const dados = {
                    meta: parseInt(fd.get('meta')),
                    disciplina: fd.get('disciplina'),
                    assunto: fd.get('assunto'),
                    tipo: fd.get('tipo'),
                    link_tec: fd.get('link_tec')
                };

                const res = editando 
                    ? await supabase.from('cronograma').update(dados).eq('id', editando.id)
                    : await supabase.from('cronograma').insert([dados]);

                if (!res.error) {
                    setEditando(null);
                    fetchData();
                    e.target.reset();
                }
            }

            // Registrar Desempenho VINCULADO
            async function handleExecucao(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const registro = {
                    cronograma_id: tarefaParaExecutar.id, // Vínculo principal
                    meta: tarefaParaExecutar.meta,
                    disciplina: tarefaParaExecutar.disciplina,
                    assunto: tarefaParaExecutar.assunto,
                    tempo: parseInt(fd.get('tempo')),
                    total: parseInt(fd.get('total')),
                    certas: parseInt(fd.get('certas'))
                };

                const { error } = await supabase.from('sessoes').insert([registro]);
                if (!error) {
                    setTarefaParaExecutar(null);
                    fetchData();
                    setAba('dashboard');
                }
            }

            // Dados para o Gráfico de Evolução (Agrupado por Meta)
            const dadosGrafico = useMemo(() => {
                const map = {};
                for(let i=1; i<=14; i++) map[i] = { name: `M${i}`, horas: 0, questões: 0 };
                sessoes.forEach(s => {
                    if(map[s.meta]) {
                        map[s.meta].horas += (s.tempo / 60);
                        map[s.meta].questões += s.total;
                    }
                });
                return Object.values(map);
            }, [sessoes]);

            if (loading) return <div className="h-screen flex items-center justify-center text-orange-500 font-black animate-pulse">SALA DO TEMPO...</div>;

            return (
                <div className="flex min-h-screen">
                    {/* SIDEBAR */}
                    <aside className="w-20 md:w-64 bg-[#111827] border-r border-slate-800 fixed h-full z-40">
                        <div className="p-8 font-black text-orange-500 italic text-xl hidden md:block">SALA DO TEMPO</div>
                        <nav className="p-4 space-y-4">
                            <button onClick={()=>setAba('dashboard')} className={`w-full p-4 rounded-2xl flex items-center gap-4 ${aba==='dashboard'?'bg-orange-500 text-white':'text-slate-500'}`}>
                                <i className="lucide-layout-grid"></i> <span className="hidden md:block">Dashboard</span>
                            </button>
                            <button onClick={()=>setAba('planejamento')} className={`w-full p-4 rounded-2xl flex items-center gap-4 ${aba==='planejamento'?'bg-orange-500 text-white':'text-slate-500'}`}>
                                <i className="lucide-calendar-plus"></i> <span className="hidden md:block">Cronograma</span>
                            </button>
                        </nav>
                    </aside>

                    <main className="flex-1 ml-20 md:ml-64 p-6 md:p-10">
                        {aba === 'dashboard' ? (
                            <div className="max-w-[1200px] mx-auto space-y-10">
                                <header className="flex justify-between items-center">
                                    <h2 className="text-3xl font-black">Sua <span className="text-orange-500">Jornada</span></h2>
                                </header>

                                {/* GRÁFICO DE LINHA - EVOLUÇÃO POR META */}
                                <div className="bg-[#111827] p-8 rounded-[2.5rem] border border-slate-800 h-[350px] shadow-2xl">
                                    <h3 className="text-xs font-black uppercase tracking-widest text-slate-500 mb-6 italic">Evolução da Carga Horária por Meta</h3>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={dadosGrafico}>
                                            <defs>
                                                <linearGradient id="colorHoras" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor="#f97316" stopOpacity={0.3}/>
                                                    <stop offset="95%" stopColor="#f97316" stopOpacity={0}/>
                                                </linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                            <XAxis dataKey="name" stroke="#475569" fontSize={10} fontWeight="bold" />
                                            <YAxis stroke="#475569" fontSize={10} fontWeight="bold" />
                                            <Tooltip contentStyle={{backgroundColor: '#111827', border: '1px solid #334155', borderRadius: '12px'}} />
                                            <Area type="monotone" dataKey="horas" stroke="#f97316" strokeWidth={4} fillOpacity={1} fill="url(#colorHoras)" />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* TABELA DE CRONOGRAMA COM REGISTRO DIRETO */}
                                <div className="bg-[#111827] rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-900/50 text-[10px] uppercase text-slate-500 font-black">
                                            <tr>
                                                <th className="p-6">Meta</th>
                                                <th className="p-6">Disciplina / Assunto</th>
                                                <th className="p-6 text-center">Progresso</th>
                                                <th className="p-6 text-center">Desempenho</th>
                                                <th className="p-6 text-right">Ação</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {plano.map(p => {
                                                const minhasSessoes = sessoes.filter(s => s.cronograma_id === p.id || (s.meta === p.meta && s.disciplina === p.disciplina));
                                                const tempoTotal = minhasSessoes.reduce((a,b)=>a+b.tempo, 0);
                                                const qTotal = minhasSessoes.reduce((a,b)=>a+b.total, 0);
                                                const qCertas = minhasSessoes.reduce((a,b)=>a+b.certas, 0);
                                                const perc = qTotal > 0 ? Math.round((qCertas/qTotal)*100) : 0;

                                                return (
                                                    <tr key={p.id} className="hover:bg-slate-800/30 transition-all">
                                                        <td className="p-6"><span className="text-orange-500 font-black">M{p.meta}</span></td>
                                                        <td className="p-6">
                                                            <div className="font-bold text-slate-200">{p.disciplina}</div>
                                                            <div className="text-xs text-slate-500 italic">{p.assunto}</div>
                                                            {p.link_tec && <a href={p.link_tec} target="_blank" className="text-[10px] text-indigo-400 hover:underline">Link do Caderno →</a>}
                                                        </td>
                                                        <td className="p-6 text-center">
                                                            <div className="text-xs font-mono font-bold text-slate-400">{tempoTotal} min</div>
                                                        </td>
                                                        <td className="p-6 text-center">
                                                            <div className={`text-xl font-black ${perc >= 80 ? 'text-emerald-400' : perc >= 60 ? 'text-orange-400' : 'text-rose-500'}`}>
                                                                {qTotal > 0 ? `${perc}%` : '--'}
                                                            </div>
                                                            <div className="text-[10px] text-slate-600 font-bold">{qTotal} questões</div>
                                                        </td>
                                                        <td className="p-6 text-right">
                                                            <button 
                                                                onClick={() => setTarefaParaExecutar(p)}
                                                                className="bg-orange-500/10 text-orange-500 p-3 rounded-xl hover:bg-orange-500 hover:text-white transition-all shadow-lg"
                                                                title="Registrar Estudo Hoje"
                                                            >
                                                                <i className="lucide-play w-4 h-4 fill-current"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            /* ABA PLANEJAMENTO - IGUAL ANTERIOR COM ADIÇÃO DO LINK TEC */
                            <div className="max-w-3xl mx-auto space-y-8 animate-pop">
                                <div className="bg-[#111827] p-10 rounded-[3rem] border border-slate-800 shadow-2xl">
                                    <h2 className="text-2xl font-black mb-8 flex items-center gap-3">
                                        <i className="lucide-edit-3 text-orange-500"></i> {editando ? "Editar Tarefa" : "Novo Planejamento"}
                                    </h2>
                                    <form onSubmit={handlePlano} className="grid grid-cols-2 gap-6">
                                        <input name="meta" type="number" defaultValue={editando?.meta} placeholder="Meta #" className="bg-[#0b0f1a] p-4 rounded-2xl border border-slate-800 outline-none font-bold" />
                                        <select name="tipo" defaultValue={editando?.tipo} className="bg-[#0b0f1a] p-4 rounded-2xl border border-slate-800 outline-none font-bold">
                                            <option>Teoria</option><option>Questões</option><option>Revisão</option>
                                        </select>
                                        <select name="disciplina" defaultValue={editando?.disciplina} className="col-span-2 bg-[#0b0f1a] p-4 rounded-2xl border border-slate-800 outline-none font-bold">
                                            {DISCIPLINAS.map(d=><option key={d}>{d}</option>)}
                                        </select>
                                        <input name="assunto" defaultValue={editando?.assunto} placeholder="Assunto da Tarefa" className="col-span-2 bg-[#0b0f1a] p-4 rounded-2xl border border-slate-800 outline-none font-bold" />
                                        <input name="link_tec" defaultValue={editando?.link_tec} placeholder="URL do TEC (Opcional)" className="col-span-2 bg-[#0b0f1a] p-4 rounded-2xl border border-slate-800 outline-none font-bold text-indigo-400" />
                                        <button className="col-span-2 bg-orange-500 text-white py-5 rounded-2xl font-black shadow-lg shadow-orange-500/20">{editando ? "ATUALIZAR" : "CADASTRAR TAREFA"}</button>
                                    </form>
                                </div>
                                {/* LISTA DE TAREFAS PARA EDITAR */}
                                <div className="space-y-4">
                                    {plano.map(t => (
                                        <div key={t.id} className="bg-[#111827] p-5 rounded-2xl flex justify-between items-center border border-slate-800">
                                            <div>
                                                <span className="text-[10px] font-black text-orange-500">M{t.meta} - {t.disciplina}</span>
                                                <p className="font-bold text-slate-300">{t.assunto}</p>
                                            </div>
                                            <button onClick={()=>setEditando(t)} className="p-3 text-slate-500 hover:text-white"><i className="lucide-pencil"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL DE REGISTRO (APARECE QUANDO CLICA NO PLAY) */}
                    {tarefaParaExecutar && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-[#111827] w-full max-w-md p-8 rounded-[2.5rem] border border-orange-500/30 shadow-2xl animate-pop">
                                <h3 className="text-xl font-black text-white mb-1">Registrar Desempenho</h3>
                                <p className="text-orange-500 font-bold text-sm mb-6 italic">{tarefaParaExecutar.disciplina} - {tarefaParaExecutar.assunto}</p>
                                
                                <form onSubmit={handleExecucao} className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-2">Tempo Gasto (Minutos)</label>
                                        <input name="tempo" type="number" required placeholder="Ex: 60" className="w-full bg-[#0b0f1a] p-4 rounded-2xl border border-slate-800 outline-none font-bold text-white" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2 text-center">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Total Q.</label>
                                            <input name="total" type="number" defaultValue="0" className="w-full bg-[#0b0f1a] p-4 rounded-2xl border border-slate-800 outline-none font-bold text-center" />
                                        </div>
                                        <div className="space-y-2 text-center">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Certas</label>
                                            <input name="certas" type="number" defaultValue="0" className="w-full bg-[#0b0f1a] p-4 rounded-2xl border border-emerald-900 outline-none font-bold text-center text-emerald-400" />
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button type="submit" className="flex-1 bg-orange-500 text-white py-4 rounded-2xl font-black shadow-lg">SALVAR</button>
                                        <button type="button" onClick={()=>setTarefaParaExecutar(null)} className="px-6 bg-slate-800 text-slate-400 rounded-2xl font-bold">FECHAR</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
