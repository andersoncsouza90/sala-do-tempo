<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sala do Tempo - Fix Final</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        const SUPABASE_URL = 'https://sflzuzorlmddprbkdczv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_3viV5YSChpIMXYHAz-e-5g_GzP1d0E8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DISCIPLINAS = ["Português", "Matemática Financeira", "Estatística", "Direito Tributário", "LTE", "Contabilidade Geral", "Contabilidade de Custos", "Auditoria", "TI", "Direito Constitucional", "Direito Administrativo", "Direito Civil", "Direito Empresarial", "Direito Penal", "Administração Geral e Pública"];

        function App() {
            const [aba, setAba] = useState('dashboard');
            const [plano, setPlano] = useState([]);
            const [sessoes, setSessoes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tarefaParaExecutar, setTarefaParaExecutar] = useState(null);

            useEffect(() => { fetchData(); }, []);

            async function fetchData() {
                try {
                    const { data: cron, error: err1 } = await supabase.from('cronograma').select('*').order('meta', { ascending: true });
                    const { data: sess, error: err2 } = await supabase.from('sessoes').select('*');
                    
                    if (err1) console.error("Erro Cronograma:", err1);
                    if (err2) console.error("Erro Sessoes:", err2);

                    setPlano(cron || []);
                    setSessoes(sess || []);
                } catch (e) {
                    console.error("Erro crítico de conexão:", e);
                } finally {
                    setLoading(false);
                }
            }

            async function registrarSessao(e) {
                e.preventDefault();
                const fd = new FormData(e.target);
                const payload = {
                    cronograma_id: tarefaParaExecutar.id,
                    meta: tarefaParaExecutar.meta,
                    disciplina: tarefaParaExecutar.disciplina,
                    assunto: tarefaParaExecutar.assunto,
                    tempo: parseInt(fd.get('tempo')) || 0,
                    total: parseInt(fd.get('total')) || 0,
                    certas: parseInt(fd.get('certas')) || 0
                };

                const { error } = await supabase.from('sessoes').insert([payload]);
                if (error) {
                    alert("Erro ao salvar! Verifique se a coluna 'cronograma_id' existe no Supabase.");
                } else {
                    setTarefaParaExecutar(null);
                    fetchData();
                }
            }

            // Gráfico Seguro
            const chartData = useMemo(() => {
                const map = {};
                for(let i=1; i<=14; i++) map[i] = { name: `M${i}`, horas: 0 };
                sessoes.forEach(s => {
                    if(s.meta && map[s.meta]) map[s.meta].horas += (s.tempo / 60);
                });
                return Object.values(map);
            }, [sessoes]);

            if (loading) return <div className="h-screen flex items-center justify-center text-orange-500 font-black animate-pulse text-2xl">INICIANDO...</div>;

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-20 md:w-64 bg-[#080c14] border-r border-slate-800 fixed h-full z-40">
                        <div className="p-8 text-orange-500 font-black italic hidden md:block text-xl">SALA DO TEMPO</div>
                        <nav className="p-4 space-y-2">
                            <button onClick={() => setAba('dashboard')} className={`w-full p-4 rounded-2xl flex gap-4 transition-all ${aba==='dashboard'?'bg-orange-500 text-white shadow-lg shadow-orange-500/20':'text-slate-500'}`}>
                                <i className="lucide-layout-grid"></i> <span className="hidden md:block font-bold">Dashboard</span>
                            </button>
                            <button onClick={() => setAba('planejar')} className={`w-full p-4 rounded-2xl flex gap-4 transition-all ${aba==='planejar'?'bg-orange-500 text-white shadow-lg shadow-orange-500/20':'text-slate-500'}`}>
                                <i className="lucide-calendar"></i> <span className="hidden md:block font-bold">Cronograma</span>
                            </button>
                        </nav>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 ml-20 md:ml-64 p-4 md:p-10">
                        {aba === 'dashboard' ? (
                            <div className="max-w-6xl mx-auto space-y-8">
                                <h2 className="text-3xl font-black italic uppercase">Performance <span className="text-orange-500">Real-Time</span></h2>
                                
                                {/* Chart */}
                                <div className="glass p-6 rounded-[2.5rem] h-64 shadow-2xl">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={chartData}>
                                            <defs>
                                                <linearGradient id="colorHr" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor="#f97316" stopOpacity={0.3}/>
                                                    <stop offset="95%" stopColor="#f97316" stopOpacity={0}/>
                                                </linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                            <XAxis dataKey="name" stroke="#475569" fontSize={10} />
                                            <YAxis stroke="#475569" fontSize={10} />
                                            <Tooltip contentStyle={{backgroundColor: '#080c14', border: 'none', borderRadius: '12px'}} />
                                            <Area type="monotone" dataKey="horas" stroke="#f97316" fillOpacity={1} fill="url(#colorHr)" strokeWidth={3} />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>

                                {/* Table */}
                                <div className="glass rounded-[2rem] overflow-hidden border border-slate-800">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-900/50 text-[10px] uppercase text-slate-500 font-black">
                                            <tr>
                                                <th className="p-6">Meta</th>
                                                <th className="p-6">Disciplina</th>
                                                <th className="p-6 text-center">Tempo</th>
                                                <th className="p-6 text-center">Acerto</th>
                                                <th className="p-6 text-right">Ação</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {plano.map(p => {
                                                const exec = sessoes.filter(s => s.cronograma_id === p.id);
                                                const min = exec.reduce((a,b) => a + b.tempo, 0);
                                                const qT = exec.reduce((a,b) => a + b.total, 0);
                                                const qC = exec.reduce((a,b) => a + b.certas, 0);
                                                const perc = qT > 0 ? Math.round((qC/qT)*100) : 0;

                                                return (
                                                    <tr key={p.id} className="hover:bg-white/[0.02] transition-colors">
                                                        <td className="p-6 font-black text-orange-500">M{p.meta}</td>
                                                        <td className="p-6">
                                                            <div className="font-bold">{p.disciplina}</div>
                                                            <div className="text-[10px] text-slate-500 uppercase">{p.assunto}</div>
                                                        </td>
                                                        <td className="p-6 text-center font-mono">{min}m</td>
                                                        <td className="p-6 text-center">
                                                            <div className={`text-xl font-black ${perc >= 70 ? 'text-emerald-500' : 'text-orange-500'}`}>{qT > 0 ? `${perc}%` : '--'}</div>
                                                            <div className="text-[10px] text-slate-600 uppercase font-black">{qT} Qs</div>
                                                        </td>
                                                        <td className="p-6 text-right">
                                                            <button onClick={() => setTarefaParaExecutar(p)} className="p-3 bg-orange-500 rounded-xl hover:scale-110 transition-transform">
                                                                <i className="lucide-play w-4 h-4 fill-current"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-2xl mx-auto py-10">
                                <h2 className="text-3xl font-black mb-6 italic">Cadastrar <span className="text-orange-500">Tarefa</span></h2>
                                <p className="text-slate-400 mb-10">Use esta aba para alimentar seu cronograma.</p>
                                {/* Aqui você pode reutilizar seu formulário de cadastro anterior */}
                                <div className="p-10 border-2 border-dashed border-slate-800 rounded-[3rem] text-center text-slate-600 font-bold uppercase">
                                    Aba Cronograma Ativa
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal Registro */}
                    {tarefaParaExecutar && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-[#0b0f1a] w-full max-w-sm p-10 rounded-[3rem] border border-orange-500/30">
                                <h3 className="text-xl font-black mb-1">{tarefaParaExecutar.disciplina}</h3>
                                <p className="text-orange-500 text-xs font-bold mb-8 italic uppercase">{tarefaParaExecutar.assunto}</p>
                                <form onSubmit={registrarSessao} className="space-y-4">
                                    <input name="tempo" type="number" placeholder="Minutos estudados" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 outline-none" required />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input name="total" type="number" placeholder="Total Qs" className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 outline-none" />
                                        <input name="certas" type="number" placeholder="Acertos" className="w-full bg-slate-900 p-4 rounded-2xl border border-emerald-900/30 text-emerald-400 outline-none" />
                                    </div>
                                    <button className="w-full bg-orange-500 py-5 rounded-2xl font-black shadow-lg shadow-orange-500/20">SALVAR REGISTRO</button>
                                    <button type="button" onClick={() => setTarefaParaExecutar(null)} className="w-full text-slate-600 font-bold text-xs uppercase pt-4">Cancelar</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
